<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <link rel="shortcut icon" href="./assets/favicon/favicon.ico" type="image/x-icon">
    <title>Escalas Musicales</title>
</head>
<body>
    <div class="mainContainer">
        <div class="menu">
            <div class="options">
                <button class="menuOption"><span class="buttonText">Generar Escala</span></button>
                <div class="buttonsContainer">
                    <button class="menuOption" onclick="CambiarEscala()">
                        <span class="buttonText" id="selectEscala">Escala Mayor</span><div class="arrowContainer"><img src="./assets/caret-down-fill.svg" alt="Icono de flecha hacia abajo del menu desplegable"></div>
                    </button>
                </div>
                <button class="menuOption" onclick="CambiarNotaAcorde()"><span class="buttonText" id="notaAcorde">Notas</span><div class="arrowContainer"><img src="./assets/caret-down-fill.svg" alt="Icono de flecha hacia abajo del menu desplegable"></div></button>
            </div>
            <button class="helpIconContainer"><img src="./assets/question-circle.svg" alt="Icono de ayuda"></button>
        </div>
        <div class="cardsContainer">
            <div class="card">
                <div class="chord"><span id="gradoI">C</span></div>
                <div class="chordOptions">
                    <button class="chordOptionContainer" onclick="CambiarGrado('Im')">C</button>
                    <button class="chordOptionContainer" onclick="CambiarGrado('IM')">C#</button>
                </div>
            </div>
            <div class="card">
                <div class="chord"><span id="gradoII"></span></div>
                <div class="chordOptions">
                    <button class="chordOptionContainer" onclick="CambiarGrado('IIm')">D</button>
                    <button class="chordOptionContainer" onclick="CambiarGrado('IIM')">D#</button>
                </div>
            </div>
            <div class="card">
                <div class="chord"><span id="gradoIII"></span></div>
                <div class="chordOptions">
                    <button class="chordOptionContainer" onclick="CambiarGrado('IIIm')">E</button>
                    <button class="chordOptionContainer" onclick="CambiarGrado('IIIM')">E#</button>
                </div>
            </div>
            <div class="card">
                <div class="chord"><span id="gradoIV"></span></div>
                <div class="chordOptions">
                    <button class="chordOptionContainer" onclick="CambiarGrado('IVm')">F</button>
                    <button class="chordOptionContainer" onclick="CambiarGrado('IVM')">F#</button>
                </div>
            </div>
            <div class="card">
                <div class="chord"><span id="gradoV"></span></div>
                <div class="chordOptions">
                    <button class="chordOptionContainer" onclick="CambiarGrado('Vm')">G</button>
                    <button class="chordOptionContainer" onclick="CambiarGrado('VM')">G#</button>
                </div>
            </div>
            <div class="card">
                <div class="chord"><span id="gradoVI"></span></div>
                <div class="chordOptions">
                    <button class="chordOptionContainer" onclick="CambiarGrado('VIm')">A</button>
                    <button class="chordOptionContainer" onclick="CambiarGrado('VIM')">A#</button>
                </div>
            </div>
            <div class="card">
                <div class="chord"><span id="gradoVII"></span></div>
                <div class="chordOptions">
                    <button class="chordOptionContainer" onclick="CambiarGrado('VIIm')">B</button>
                    <button class="chordOptionContainer" onclick="CambiarGrado('VIIM')">B#</button>
                </div>
            </div>
        </div>
    </div>
    <div class="answerContainer">
        <div class="card">
            <div class="chord"><span class="textAnswer">C</span></div>
        </div>
        <div class="card wrongAnswer">
            <div class="chord"><span class="textAnswer">C</span></div>
        </div>
        <div class="card">
            <div class="chord"><span class="textAnswer">C</span></div>
        </div>
        <div class="card correctAnswer">
            <div class="chord"><span class="textAnswer">C</span></div>
        </div>
        <div class="card">
            <div class="chord"><span class="textAnswer">C</span></div>
        </div>
        <div class="card">
            <div class="chord"><span class="textAnswer">C</span></div>
        </div>
        <div class="card">
            <div class="chord"><span class="textAnswer">C</span></div>
        </div>
    </div>
    <div class="buttonContainer">
        <button class="menuOption comprobarRespuesta" onclick="ObtenerRespuesta()">comprobar respuesta</button>
    </div>
    <div class="footer">
        <span>© Pablo Chaparro 2026</span>
    </div>
</body>
<script src="./script.js"></script>
</html>
