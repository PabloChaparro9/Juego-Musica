<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <link rel="shortcut icon" href="./assets/favicon/favicon.ico" type="image/x-icon">
    <title>Escalas Musicales</title>
</head>
<body>
    <div class="mainContainer">
        <div class="menu">
            <div class="options">
                <button class="menuOption"><span class="buttonText">Generar Escala</span></button>
                <button class="menuOption escala"><span class="buttonText">Escala Mayor</span><div class="arrowContainer"><img src="./assets/caret-down-fill.svg" alt="Icono de flecha hacia abajo del menu desplegable"></div></button>
                <button class="menuOption"><span class="buttonText">Notas</span><div class="arrowContainer"><img src="./assets/caret-down-fill.svg" alt="Icono de flecha hacia abajo del menu desplegable"></div></button>
            </div>
            <button class="helpIconContainer"><img src="./assets/question-circle.svg" alt="Icono de ayuda"></button>
        </div>
        <div class="cardsContainer">
            <div class="card">
                <div class="chord"><span>C</span></div>
                <div class="chordOptions">
                    <button class="chordOptionContainer">C</button>
                    <button class="chordOptionContainer">C#</button>
                </div>
            </div>
            <div class="card">
                <div class="chord">C</div>
                <div class="chordOptions">
                    <div class="chordOptionContainer">C</div>
                    <div class="chordOptionContainer">C#</div>
                </div>

                <div class="chordOptions">
                    <div class="chordOptionContainer">C</div>
                    <div class="chordOptionContainer">C#</div>
                </div>
            </div>
            <div class="card">
                <div class="chord">C</div>
                <div class="chordOptions">
                    <div class="chordOptionContainer">C</div>
                    <div class="chordOptionContainer">C#</div>
                </div>
            </div>
            <div class="card">
                <div class="chord">C</div>
                <div class="chordOptions">
                    <div class="chordOptionContainer">C</div>
                    <div class="chordOptionContainer">C#</div>
                </div>
            </div>
            <div class="card">
                <div class="chord">C</div>
                <div class="chordOptions">
                    <div class="chordOptionContainer">C</div>
                    <div class="chordOptionContainer">C#</div>
                </div>
            </div>
            <div class="card">
                <div class="chord">C</div>
                <div class="chordOptions">
                    <div class="chordOptionContainer">C</div>
                    <div class="chordOptionContainer">C#</div>
                </div>
            </div>
        </div>
    </div>
    <div class="answerContainer">
        <div class="card">
            <div class="chord"><span class="textAnswer">C</span></div>
        </div>
        <div class="card wrongAnswer">
            <div class="chord"><span class="textAnswer">C</span></div>
        </div>
        <div class="card">
            <div class="chord"><span class="textAnswer">C</span></div>
        </div>
        <div class="card correctAnswer">
            <div class="chord"><span class="textAnswer">C</span></div>
        </div>
