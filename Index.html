<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <link rel="shortcut icon" href="./assets/favicon/favicon.ico" type="image/x-icon">
    <title>Escalas Musicales</title>
</head>
<body>
    <div class="mainContainer">
        <div class="menu">
            <div class="options">
                <button class="menuOption"><span class="buttonText">Generar Escala</span></button>
                <button class="menuOption" onclick="CambiarEscala()">
                    <span class="buttonText" id="selectEscala">Escala Mayor</span><div class="arrowContainer"><img src="./assets/caret-down-fill.svg" alt="Icono de flecha hacia abajo del menu desplegable"></div>
                </button>
                <button class="menuOption" onclick="CambiarNotaAcorde()"><span class="buttonText" id="notaAcorde">Notas</span><div class="arrowContainer"><img src="./assets/caret-down-fill.svg" alt="Icono de flecha hacia abajo del menu desplegable"></div></button>
            </div>
            <button class="helpIconContainer"><img src="./assets/question-circle.svg" alt="Icono de ayuda"></button>
        </div>
        <div class="cardsContainer">
            <div class="card">
                <div class="chord"><span id="gradoI">C</span></div>
                <div class="chordOptions">
                    <button class="chordOptionContainer" onclick="CambiarGrado('Im',0)">C</button>
                    <button class="chordOptionContainer" onclick="CambiarGrado('IM',0)">C#</button>
                </div>
            </div>
            <div class="card">
                <div class="chord"><span id="gradoII"></span></div>
                <div class="chordOptions">
                    <button class="chordOptionContainer" onclick="CambiarGrado('IIm',1)">D</button>
                    <button class="chordOptionContainer" onclick="CambiarGrado('IIM',1)">D#</button>
                </div>
            </div>
            <div class="card">
                <div class="chord"><span id="gradoIII"></span></div>
                <div class="chordOptions">
                    <button class="chordOptionContainer" onclick="CambiarGrado('IIIm',2)">E</button>
                    <button class="chordOptionContainer" onclick="CambiarGrado('IIIM',2)">E#</button>
                </div>
            </div>
            <div class="card">
                <div class="chord"><span id="gradoIV"></span></div>
                <div class="chordOptions">
                    <button class="chordOptionContainer" onclick="CambiarGrado('IVm',3)">F</button>
                    <button class="chordOptionContainer" onclick="CambiarGrado('IVM',3)">F#</button>
                </div>
            </div>
            <div class="card">
                <div class="chord"><span id="gradoV"></span></div>
                <div class="chordOptions">
                    <button class="chordOptionContainer" onclick="CambiarGrado('Vm',4)">G</button>
                    <button class="chordOptionContainer" onclick="CambiarGrado('VM',4)">G#</button>
                </div>
            </div>
            <div class="card">
                <div class="chord"><span id="gradoVI"></span></div>
                <div class="chordOptions">
                    <button class="chordOptionContainer" onclick="CambiarGrado('VIm',5)">A</button>
                    <button class="chordOptionContainer" onclick="CambiarGrado('VIM',5)">A#</button>
                </div>
            </div>
            <div class="card">
                <div class="chord"><span id="gradoVII"></span></div>
                <div class="chordOptions">
                    <button class="chordOptionContainer" onclick="CambiarGrado('VIIm',6)">B</button>
                    <button class="chordOptionContainer" onclick="CambiarGrado('VIIM',6)">B#</button>
                </div>
            </div>
        </div>
    </div>
    <div class="answerContainer">
        <div class="card">
            <div class="chord" id="chordI"><span class="textAnswer"></span></div>
        </div>
        <div class="card">
            <div class="chord" id="chordII"><div class="questionMarcContainer"><img src="./assets/question-lg.svg" alt="Símbolo de interrogación"></div></div>
        </div>
        <div class="card">
            <div class="chord" id="chordIII"><div class="questionMarcContainer"><img src="./assets/question-lg.svg" alt="Símbolo de interrogación"></div></div>
        </div>
        <div class="card">
            <div class="chord" id="chordIV"><div class="questionMarcContainer"><img src="./assets/question-lg.svg" alt="Símbolo de interrogación"></div></div>
        </div>
        <div class="card">
            <div class="chord" id="chordV"><div class="questionMarcContainer"><img src="./assets/question-lg.svg" alt="Símbolo de interrogación"></div></div>
        </div>
        <div class="card">
            <div class="chord" id="chordVI"><div class="questionMarcContainer"><img src="./assets/question-lg.svg" alt="Símbolo de interrogación"></div></div>
        </div>
        <div class="card">
            <div class="chord" id="chordVII"><div class="questionMarcContainer"><img src="./assets/question-lg.svg" alt="Símbolo de interrogación"></div></div>
        </div>
    </div>
    <div class="buttonContainer">
        <button class="menuOption comprobarRespuesta" id="comprobarRespuesta" disabled onclick="ObtenerRespuesta()">comprobar respuesta</button>
    </div>
    <div class="footer">
        <span>© Pablo Chaparro 2026</span>
    </div>
</body>
<script src="./script.js"></script>
</html>
